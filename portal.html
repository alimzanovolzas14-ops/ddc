<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Портал сотрудника — ЦЦР</title>
<meta name="robots" content="noindex, nofollow">
<link rel="canonical" href="https://www.ddcnb.kz/portal.html">
<meta property="og:type" content="website">
<meta property="og:site_name" content="DDC — Центр цифрового развития">
<meta property="og:title" content="Портал сотрудника — ЦЦР">
<meta property="og:url" content="https://www.ddcnb.kz/portal.html">
<meta property="og:image" content="https://www.ddcnb.kz/img/ddc_mark_blue.png">
<meta property="og:locale" content="ru_RU">
<meta property="og:locale:alternate" content="kk_KZ">
<meta property="og:locale:alternate" content="en_US">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Портал сотрудника — ЦЦР">
<meta name="twitter:image" content="https://www.ddcnb.kz/img/ddc_mark_blue.png">
<meta name="theme-color" content="#0a2540">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1a2340">
<link rel="apple-touch-icon" href="img/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DDC Портал">
<script src="config.js"></script>
<style>
:root{
  --bg:#f4f6fa;--panel:#fff;--ink:#1a2340;--ink-2:#4a5468;--muted:#8a93a6;
  --line:#eceff5;--blue:#2f6df6;--blue-soft:#eaf1ff;--green:#1fab6b;--amber:#e2960f;--red:#e5484d;
  --radius:14px;--shadow:0 1px 3px rgba(20,30,60,.05),0 10px 26px -20px rgba(20,30,60,.18);
}
*{box-sizing:border-box}
[hidden]{display:none!important}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
input,select,textarea{font-family:inherit;font-size:14px}

/* Login */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(1200px 600px at 70% -10%,#e9eefc,transparent),var(--bg)}
.login-back{position:fixed;top:20px;left:24px;color:var(--ink-2);font-size:14px;font-weight:500;text-decoration:none;padding:8px 14px;border:1px solid var(--line);border-radius:10px;background:var(--panel)}
.login-back:hover{color:var(--blue);border-color:var(--blue)}
.login-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:38px 34px;max-width:400px;width:100%;box-shadow:0 30px 80px -40px rgba(20,30,60,.4);text-align:center}
.login-logo{width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#1a2340,#2f6df6);display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px}
.login-logo img{width:30px;height:30px}
.login-card h1{font-size:22px;margin:0 0 4px}
.login-card .sub{color:var(--muted);margin:0 0 24px;font-size:13px}
.login-card input{width:100%;border:1px solid var(--line);background:var(--bg);border-radius:10px;padding:12px 14px;margin-bottom:10px;outline:none}
.login-card input:focus{border-color:var(--blue);background:#fff}
.btn{border:0;border-radius:10px;padding:12px 18px;font-weight:600;cursor:pointer;font-size:14px}
.btn-primary{background:var(--blue);color:#fff;width:100%}
.btn-primary:hover{background:#215fe0}
.login-err{color:var(--red);font-size:13px;min-height:18px;margin:6px 0}
.login-hint{margin-top:18px;font-size:12px;color:var(--muted);line-height:1.6}
.login-hint code{background:var(--bg);border:1px solid var(--line);border-radius:5px;padding:1px 5px}

/* App shell */
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.side{background:var(--panel);border-right:1px solid var(--line);position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
.side-brand{display:flex;align-items:center;gap:12px;padding:20px}
.side-logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#1a2340,#2f6df6);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.side-logo img{width:24px;height:24px}
.side-brand b{font-size:16px;display:block;line-height:1}.side-brand span{font-size:11px;color:var(--muted);display:block;margin-top:3px;line-height:1.3}
.side-nav{flex:1;overflow-y:auto;padding:8px 12px}
.side-nav button{display:flex;align-items:center;gap:12px;width:100%;padding:11px 12px;border:0;background:none;border-radius:10px;color:var(--ink-2);font-weight:500;margin-bottom:2px;cursor:pointer;text-align:left;font-size:14px}
.side-nav button:hover{background:var(--bg)}
.side-nav button.active{background:var(--blue);color:#fff}
.side-nav button.active svg{stroke:#fff}
.side-nav svg{width:18px;height:18px;stroke:var(--muted);stroke-width:1.8;fill:none;flex-shrink:0}
.side-user{display:flex;align-items:center;gap:10px;padding:14px 16px;border-top:1px solid var(--line)}
.side-user .ava{width:38px;height:38px;border-radius:50%;background:var(--blue-soft);color:var(--blue);display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.side-user b{font-size:13px;display:block}.side-user span{font-size:11px;color:var(--muted)}
.side-user .lo{margin-left:auto;border:1px solid var(--line);background:#fff;border-radius:8px;width:32px;height:32px;cursor:pointer;color:var(--ink-2)}

.main{min-width:0;display:flex;flex-direction:column}
.top{background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:12px 26px;position:sticky;top:0;z-index:20}
.burger{display:none;width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:#fff;cursor:pointer}
.search{flex:1;max-width:460px;position:relative}
.search input{width:100%;border:1px solid var(--line);background:var(--bg);border-radius:10px;padding:10px 14px 10px 40px;outline:none}
.search input:focus{border-color:var(--blue);background:#fff}
.search svg{position:absolute;left:13px;top:11px;width:17px;height:17px;stroke:var(--muted);stroke-width:2;fill:none}
.top-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
.iconbtn{position:relative;width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--panel);cursor:pointer;display:flex;align-items:center;justify-content:center}
.iconbtn:hover{border-color:var(--blue)}
.iconbtn svg{width:19px;height:19px;stroke:var(--ink-2);stroke-width:1.8;fill:none}
.iconbtn .dot{position:absolute;top:-5px;right:-5px;min-width:17px;height:17px;padding:0 4px;border-radius:9px;background:var(--red);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.content{padding:24px 26px 44px}

/* Common */
.hello{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px}
.hello h1{font-size:26px;margin:0 0 4px}.hello p{margin:0;color:var(--ink-2)}
.hello .when{text-align:right}.hello .when .d{font-size:13px;color:var(--muted)}.hello .when .t{font-size:26px;font-weight:700}
.vtitle{font-size:22px;margin:0 0 4px}.vsub{color:var(--ink-2);margin:0 0 20px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-h{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line)}
.card-h h3{margin:0;font-size:15px;font-weight:600}.card-h a,.card-h button.link{font-size:13px;color:var(--blue);font-weight:500;background:none;border:0;cursor:pointer}
.card-b{padding:14px 18px}
.grid{display:grid;gap:20px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.mb20{margin-bottom:20px}
.empty{color:var(--muted);font-size:13px;padding:18px 0;text-align:center}
.badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:7px;white-space:nowrap}
.b-work{background:var(--blue-soft);color:var(--blue)}.b-wait{background:#fdf3e0;color:var(--amber)}.b-done{background:#e6f7ee;color:var(--green)}.b-new{background:#eef1f6;color:var(--ink-2)}.b-rej{background:#fde8e8;color:#c9302c}
.field{margin-bottom:12px}.field label{display:block;font-size:12px;color:var(--ink-3,#6b7280);font-weight:600;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue)}
.btn-sm{border:1px solid var(--line);background:#fff;border-radius:9px;padding:8px 14px;font-weight:600;cursor:pointer;color:var(--ink-2);font-size:13px}
.btn-sm:hover{border-color:var(--blue);color:var(--blue)}

/* KPI */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;display:flex;gap:14px;box-shadow:var(--shadow)}
.stat .si{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:22px}
.si.b{background:var(--blue-soft)}.si.g{background:#e6f7ee}.si.p{background:#f0ebfd}.si.a{background:#fdf3e0}
.stat .st-h{font-size:13px;color:var(--ink-2);font-weight:500}
.stat .st-n{font-size:26px;font-weight:700;line-height:1.1;margin:2px 0}
.stat .st-s{font-size:12px;color:var(--muted)}.stat .st-s.warn{color:var(--red)}

/* lists */
.row{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.row:last-child{border-bottom:0}
.row .r-r{margin-left:auto}
.news-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}.news-item:last-child{border-bottom:0}
.news-ic{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#1a2340,#2f6df6);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px}
.news-item b{font-size:13.5px;display:block;line-height:1.35}.news-item p{margin:4px 0 3px;font-size:12.5px;color:var(--ink-2);line-height:1.4}
.news-item .dt{font-size:11px;color:var(--muted)}
.task{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);font-size:13.5px}.task:last-child{border-bottom:0}
.task .ring{width:18px;height:18px;border:2px solid var(--line);border-radius:50%;flex-shrink:0}
.due{margin-left:auto;font-size:11px;font-weight:600;padding:3px 9px;border-radius:7px;white-space:nowrap}
.due.ok{background:#e6f7ee;color:var(--green)}.due.soon{background:#fdf3e0;color:var(--amber)}.due.over{background:#fde8e8;color:var(--red)}
.qa{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.qa a{border:1px solid var(--line);border-radius:12px;padding:14px 8px;text-align:center}.qa a:hover{border-color:var(--blue)}
.qa .qi{font-size:22px}.qa b{font-size:12px;display:block;margin-top:6px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:13px}.srow:last-child{border-bottom:0}
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:7px}.sdot.ok{background:var(--green)}.sdot.warn{background:var(--amber)}.sdot.down{background:var(--red)}

/* directory / employees */
.dir{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.dir-card{border:1px solid var(--line);border-radius:14px;padding:16px;background:#fff}
.dir-card b{font-size:14px}.dir-card .d{font-size:12px;color:var(--muted);margin-top:2px}.dir-card .sk{font-size:12px;color:var(--ink-2);margin-top:8px}
.dir-card a{font-size:12px;color:var(--blue);margin-top:8px;display:inline-block}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;margin-left:6px}
.chip::before{content:"";width:7px;height:7px;border-radius:50%}
.c-office{background:#e6f7ee;color:#248a3d}.c-office::before{background:#30d158}
.c-remote{background:var(--blue-soft);color:#0058b8}.c-remote::before{background:#2f6df6}
.c-vacation{background:#fdf3e0;color:#a85b00}.c-vacation::before{background:#ff9f0a}
.c-dnd{background:#fde8e8;color:#c9302c}.c-dnd::before{background:#e5484d}
.odot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin:0 2px}.odot.on{background:#1fab6b}.odot.off{background:#c3cad6}
.chat-wrap{display:grid;grid-template-columns:220px 1fr;min-height:440px}
.chat-side{border-right:1px solid var(--line);padding:8px;overflow-y:auto;max-height:520px}
.chpeer{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:0;border-radius:9px;padding:9px 10px;cursor:pointer;font:inherit;font-size:13px;color:var(--ink)}
.chpeer:hover{background:var(--bg)}.chpeer.active{background:var(--blue-soft);color:var(--blue);font-weight:600}
.ch-sec{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);font-weight:600;padding:12px 10px 4px}
.ch-new{color:var(--blue);font-weight:600}
.chat-head{padding:12px 16px;border-bottom:1px solid var(--line);font-size:13px;font-weight:600;color:var(--ink-2)}
.grp-m{display:block;padding:8px 11px;border:1px solid var(--line);border-radius:8px;margin-bottom:5px;cursor:pointer;font-size:13.5px}
.grp-m input{margin-right:8px}
.chat-main{display:flex;flex-direction:column}
.chat-log{flex:1;overflow-y:auto;padding:16px;max-height:460px;display:flex;flex-direction:column;gap:8px}
.cmsg{display:flex}.cmsg.me{justify-content:flex-end}
.cmsg-b{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:9px 13px;font-size:13.5px;max-width:75%;line-height:1.4}
.cmsg.me .cmsg-b{background:var(--blue);color:#fff;border-color:var(--blue)}
.chat-in{display:flex;gap:8px;padding:12px;border-top:1px solid var(--line)}
.chat-in input{flex:1;border:1px solid var(--line);border-radius:10px;padding:10px 13px;outline:none}
@media(max-width:640px){.chat-wrap{grid-template-columns:1fr}.chat-side{max-height:130px;border-right:0;border-bottom:1px solid var(--line);display:flex;overflow-x:auto}.chpeer{flex:0 0 auto}}

/* learning */
.course{border:1px solid var(--line);border-radius:14px;padding:18px;background:#fff}
.course h4{margin:0 0 6px;font-size:15px}.course p{margin:0 0 12px;font-size:13px;color:var(--ink-2)}
.crs-links{display:flex;gap:14px;flex-wrap:wrap;margin:0 0 14px}
.crs-links a{font-size:12.5px;color:var(--blue);font-weight:500}
.quiz-q{margin-bottom:16px}.quiz-q b{display:block;margin-bottom:8px;font-size:14px}
.quiz-o{display:block;padding:9px 11px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;cursor:pointer;font-size:13.5px}
.quiz-o:hover{border-color:var(--blue)}.quiz-o input{margin-right:8px}
.quiz-res{margin-top:8px;font-size:14px}
.mand{border:1px solid var(--line);border-radius:14px;padding:14px 16px;background:linear-gradient(135deg,rgba(229,72,77,.05),rgba(47,109,246,.04));margin-bottom:18px}
.mand-h{font-weight:600;margin-bottom:10px}.mand-row{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--line);font-size:13.5px}

/* tables */
table.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
table.tbl th,table.tbl td{text-align:left;padding:10px;border-bottom:1px solid var(--line)}
table.tbl th{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted)}
.ok{color:var(--green);font-weight:600}.no{color:var(--red);font-weight:600}
.bar-row{display:grid;grid-template-columns:130px 1fr 44px;gap:10px;align-items:center;padding:7px 0;font-size:13px}
.bar-l{color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.bar-v{text-align:right;font-weight:600}
.bar-t{height:9px;border-radius:5px;background:var(--line);overflow:hidden}.bar-t i{display:block;height:100%;border-radius:5px}
.more-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.more-pill{border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:8px 16px;font:inherit;font-size:13px;cursor:pointer;color:var(--ink-2)}
.more-pill:hover{border-color:var(--blue)}.more-pill.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-sm.voted{background:var(--blue-soft);color:var(--blue);border-color:var(--blue)}
.pollopt{display:block;width:100%;text-align:left;margin-bottom:6px}
.org-node{border:1px solid var(--line);border-radius:10px;padding:10px 14px;background:var(--panel);font-size:13.5px}
.org-node.lvl0{background:var(--blue);color:#fff;text-align:center;font-weight:600;max-width:340px;margin:0 auto 16px;border-color:var(--blue)}
.org-tree{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.org-unit .org-node.lvl1{font-weight:600;margin-bottom:8px;background:var(--bg)}
.org-subs{display:flex;flex-direction:column;gap:6px;padding-left:10px}
.org-node.lvl2{font-size:12.5px;color:var(--ink-2);padding:7px 12px}
.kb-item{padding:12px 0;border-bottom:1px solid var(--line)}.kb-item:last-child{border-bottom:0}
.kb-cat{font-size:11px;font-weight:600;color:var(--blue);background:var(--blue-soft);padding:2px 9px;border-radius:999px}
.kb-item b{display:block;margin:6px 0 3px;font-size:14px}.kb-item p{margin:0 0 4px;font-size:13px;color:var(--ink-2)}.kb-item a{font-size:12.5px;color:var(--blue)}
.onb-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13.5px;cursor:pointer}.onb-item input{width:17px;height:17px}
body.dark{--bg:#0f1420;--panel:#161d2e;--ink:#e7eaf1;--ink-2:#aab3c5;--muted:#727c90;--line:#252d3f;--blue-soft:#18243d}
body.dark .login{background:radial-gradient(1200px 600px at 70% -10%,#182238,transparent),#0f1420}
body.dark .login-card h1{color:#f2f4f8}
body.dark .login-card .sub{color:#aab3c5}
body.dark .login-card{background:#161d2e;border-color:var(--line)}
body.dark .login-card input{background:#0f1420;color:var(--ink)}
body.dark .login-card input:focus{background:#0f1420}
body.dark .cyt{background:var(--panel);color:var(--ink)}
body.dark .quiz-o,body.dark .grp-m{background:var(--panel)}

/* cyber */
.cyb{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:6px}
.cyt{border:1px solid var(--line);border-radius:14px;padding:16px;background:#fff}
.cyt b{display:block;font-size:28px;font-weight:700;line-height:1}.cyt span{font-size:12px;color:var(--muted);margin-top:6px;display:block}
.cyt.crit b{color:var(--red)}.cyt.warn b{color:var(--amber)}.cyt.okc b{color:var(--green)}
.sev{font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;text-transform:uppercase}
.sev-low{background:#e6f7ee;color:#248a3d}.sev-med{background:#fdf3e0;color:#a85b00}.sev-high{background:#fde8e8;color:#c9302c}

/* doc modal */
.modal{position:fixed;inset:0;background:rgba(10,15,30,.55);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:24px;overflow:auto}
.modal.open{display:flex}
.modal-card{background:#fff;border-radius:14px;max-width:760px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.doc-sheet{padding:48px 54px;color:#111;font-family:Georgia,'Times New Roman',serif}
.doc-head{display:flex;align-items:center;gap:16px}.doc-logo{width:52px;height:52px}
.doc-org b{display:block;font-size:15px;font-family:system-ui,sans-serif;color:#0a2540}.doc-org span{font-size:12px;color:#555;font-family:system-ui,sans-serif}
.doc-rule{height:2px;background:#0a2540;margin:14px 0 22px}
.doc-meta{display:flex;justify-content:space-between;font-size:13px;color:#333;font-family:system-ui,sans-serif;margin-bottom:24px}
.doc-title{text-align:center;font-size:20px;letter-spacing:.08em;color:#0a2540;font-family:system-ui,sans-serif;font-weight:700;margin:0 0 22px}
.doc-body{font-size:15px;line-height:1.75;text-align:justify;min-height:110px}
.doc-sign{margin-top:48px;display:flex;justify-content:space-between;align-items:flex-end;font-family:system-ui,sans-serif;font-size:13px}

/* AI */

.toast.show{opacity:1}
.bell-wrap{position:relative}
.bell-panel{position:absolute;top:48px;right:0;width:330px;max-width:86vw;max-height:60vh;overflow:auto;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 30px 70px -24px rgba(20,30,60,.35);z-index:130;padding:6px}
.bell-head{font-weight:600;font-size:14px;padding:10px 12px}
.bn{display:flex;gap:10px;align-items:flex-start;width:100%;text-align:left;background:none;border:0;border-radius:10px;padding:10px 12px;cursor:pointer;font:inherit;font-size:13px;color:var(--ink)}
.bn:hover{background:var(--bg)}.bn-i{flex-shrink:0}

.kmodal-box{width:min(440px,94vw);background:var(--panel,#fff);border:1px solid var(--line);border-radius:16px;padding:20px 22px;box-shadow:0 40px 90px -30px rgba(10,20,50,.5)}

.krow{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:10px 0;border-top:1px solid var(--line);font-size:13.5px;color:var(--ink)}

.kmodal-close:hover{background:var(--bg)}
.sw{position:relative;width:40px;height:22px;border-radius:20px;background:var(--line);cursor:pointer;transition:.2s;flex-shrink:0;border:0;padding:0}

.sw::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s}
.sw.on::after{left:20px}
</style>

<script>
(function(){
  var DB=window.DDCDB, CUR=null;
  var $=function(id){return document.getElementById(id);};
  function esc(s){return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function ini(n){n=(n||'').trim().split(/\s+/);return (((n[0]||'')[0]||'')+((n[1]||'')[0]||'')).toUpperCase()||'DD';}
  function toast(t){var e=$('toast');e.textContent=t;e.classList.add('show');setTimeout(function(){e.classList.remove('show');},2200);}
  function fmtD(d){if(!d)return '—';try{return new Date(d).toLocaleDateString('ru-RU');}catch(e){return d;}}
  function fmtDL(d){if(!d)return '____';try{return new Date(d).toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'});}catch(e){return d;}}
  var roleRu={admin:'Администратор',manager:'Руководитель',employee:'Сотрудник',security:'Центр киберзащиты'};
  var REQUIRED=[{id:'c1',dl:'2026-08-31'},{id:'c5',dl:'2026-09-15'},{id:'c6',dl:'2026-09-30'}];
  function isMgr(){return CUR&&(CUR.role==='admin'||CUR.role==='manager');}
  function isSec(){return CUR&&(CUR.role==='admin'||CUR.role==='security');}

  var IC={home:'<path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/>',ticket:'<path d="M3 8a2 2 0 012-2h14a2 2 0 012 2v3a2 2 0 000 4v3a2 2 0 01-2 2H5a2 2 0 01-2-2v-3a2 2 0 000-4z"/>',people:'<circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0112 0"/><circle cx="17" cy="9" r="2"/>',chat:'<path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>',cap:'<path d="M2 9l10-4 10 4-10 4z"/><path d="M6 11v5c0 1 3 2 6 2s6-1 6-2v-5"/>',doc:'<path d="M6 2h8l4 4v16H6z"/><path d="M14 2v4h4"/>',shield:'<path d="M12 2l8 3v6c0 5-3.5 8-8 11-4.5-3-8-6-8-11V5z"/>',more:'<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',chart:'<path d="M4 20V4M20 20H4M8 16v-4M12 16V8M16 16v-6"/>'};
  var NAV=[['home','Главная'],['requests','Заявки и сервисы'],['people','Сотрудники'],['chat','Чат'],['learning','Обучение'],['docs','Документы'],['security','Безопасность'],['more','Ещё'],['analytics','Аналитика']];
  var view='home';

  function progressOf(){return (DB.progress&&DB.progress.get(CUR.login))||[];}
  function myReqs(){return DB.reqs.list().filter(function(r){return r.login===CUR.login;});}

  /* ---------- shell ---------- */
  function buildShell(){
    $('uName').textContent=CUR.name||CUR.login;$('uRole').textContent=roleRu[CUR.role]||'Сотрудник';$('uAva').textContent=ini(CUR.name);
    $('nav').innerHTML=NAV.filter(function(n){return n[0]!=='analytics'||isMgr();}).map(function(n){return '<button data-v="'+n[0]+'" class="'+(n[0]===view?'active':'')+'"><svg viewBox="0 0 24 24">'+IC[n[0]]+'</svg>'+n[1]+(n[0]==='chat'?'<span class="nav-badge" id="navChatBadge" hidden></span>':'')+'</button>';}).join('');
    [].forEach.call($('nav').querySelectorAll('button'),function(b){b.addEventListener('click',function(){go(b.getAttribute('data-v'));$('side').classList.remove('open');});});
    renderBell();
    try{updateChatBadge();}catch(e){}
  }
  function go(v){view=v;[].forEach.call($('nav').querySelectorAll('button'),function(b){b.classList.toggle('active',b.getAttribute('data-v')===v);});window.scrollTo(0,0);render();}
  function render(){var f={home:renderHome,requests:renderRequests,people:renderPeople,chat:renderChat,learning:renderLearning,docs:renderDocs,security:renderSecurity,more:renderMore,analytics:renderAnalytics}[view]||renderHome;f();if(typeof afterRender==='function'){try{afterRender();}catch(e){}}}

  function notifs(){
    var out=[];
    DB.ann.list().slice(0,3).forEach(function(a){out.push({i:'<i class="ic" data-lucide="megaphone"></i>',t:'Новость: '+a.title,v:'home'});});
    myReqs().filter(function(r){return r.status==='progress'||r.status==='closed';}).slice(0,3).forEach(function(r){out.push({i:'<i class="ic" data-lucide="inbox"></i>',t:'Заявка «'+r.type+'»: '+(r.status==='closed'?'закрыта':'в работе'),v:'requests'});});
    var done=progressOf(),courses=DB.courses.list();
    REQUIRED.forEach(function(rq){if(done.indexOf(rq.id)>=0)return;var c=courses.filter(function(x){return x.id===rq.id;})[0];if(!c)return;var days=Math.ceil((new Date(rq.dl+'T23:59')-new Date())/864e5);if(days<=14)out.push({i:'<i class="ic" data-lucide="shield"></i>',t:(days<0?'Просрочен курс: ':'Дедлайн курса: ')+c.title,v:'learning'});});
    if(isSec())DB.incidents.list().filter(function(i){return (i.status||'new')!=='closed';}).slice(0,2).forEach(function(i){out.push({i:'<i class="ic" data-lucide="siren"></i>',t:'Инцидент ИБ: '+i.type,v:'security'});});
    var seen=0; try{seen=+localStorage.getItem('ddc_seen_'+CUR.login)||0;}catch(e){}
    var msgs=[];
    DB.dm.list().filter(function(m){return m.to===CUR.login&&m.from!==CUR.login&&new Date(m.ts).getTime()>seen;}).slice(-4).forEach(function(m){msgs.push({i:'<i class="ic" data-lucide="message-circle"></i>',t:'Сообщение от '+uName(m.from)+': '+(m.text||'').slice(0,40),v:'chat',peer:m.from});});
    myGroups().forEach(function(g){DB.gm.list().filter(function(m){return m.group===g.id&&m.from!==CUR.login&&new Date(m.ts).getTime()>seen;}).slice(-2).forEach(function(m){msgs.push({i:'<i class="ic" data-lucide="users"></i>',t:g.name+' — '+uName(m.from)+': '+(m.text||'').slice(0,30),v:'chat',peer:'g:'+g.id});});});
    return msgs.concat(out);
  }
  function renderBell(){var n=notifs().length,d=$('bellDot');if(n){d.style.display='flex';d.textContent=n>9?'9+':n;}else d.style.display='none';}
  function renderBellPanel(){var list=notifs(),box=$('bellList');if(!box)return;box.innerHTML=list.length?list.map(function(n,idx){return '<button class="bn" data-bv="'+(n.v||'home')+'" data-peer="'+(n.peer!=null?esc(String(n.peer)):'')+'"><span class="bn-i">'+n.i+'</span><span>'+esc(n.t)+'</span></button>';}).join(''):'<div class="empty">Новых уведомлений нет.</div>';[].forEach.call(box.querySelectorAll('[data-bv]'),function(b){b.addEventListener('click',function(){$('bellPanel').hidden=true;var v=b.getAttribute('data-bv'),pr=b.getAttribute('data-peer');if(v==='chat'){chatPeer=pr?pr:null;go('chat');}else go(v);});});try{localStorage.setItem('ddc_seen_'+CUR.login,Date.now());}catch(e){}setTimeout(renderBell,60);}

  /* ---------- HOME ---------- */
  function renderHome(){
    var done=progressOf(),courses=DB.courses.list(),reqs=myReqs(),ann=DB.ann.list(),events=DB.events.list();
    var reqC=REQUIRED.map(function(rq){var c=courses.filter(function(x){return x.id===rq.id;})[0];return c?{title:c.title,dl:rq.dl,passed:done.indexOf(rq.id)>=0,days:Math.ceil((new Date(rq.dl+'T23:59')-new Date())/864e5)}:null;}).filter(Boolean);
    var tasks=reqC.filter(function(t){return !t.passed;}),overdue=tasks.filter(function(t){return t.days<0;}).length;
    var openReqs=reqs.filter(function(r){return (r.status||'new')!=='closed';}),waiting=reqs.filter(function(r){return (r.status||'new')==='new';}).length;
    var inProg=Math.max(0,courses.length-done.length);
    var PROJ=[['Депозитный регистр','Разработка',78],['Фабрика данных НБК','Данные',64],['Портал закупок','Сопровождение',92],['Модернизация SOC','Кибербезопасность',45],['DevSecOps','Разработка',58]];
    var meetings=events.filter(function(e){return e.date&&new Date(e.date).toDateString()===new Date().toDateString();}).length;
    var now=new Date(),days=['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'],mon=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    var kpi=[
      ['b','<i class="ic" data-lucide="clipboard-list"></i>','Мои задачи',tasks.length,(overdue?'<span class="st-s warn">'+overdue+' просрочено</span>':'<span class="st-s">всё в срок</span>')],
      ['g','<i class="ic" data-lucide="inbox"></i>','Заявки в работе',openReqs.length,'<span class="st-s">'+waiting+' ожидает ответа</span>'],
      ['p','<i class="ic" data-lucide="file-text"></i>','Документы',DB.docs.list().length,'<span class="st-s">создано вами</span>'],
      ['a','<i class="ic" data-lucide="graduation-cap"></i>','Обучение',inProg,'<span class="st-s">курса в процессе</span>'],
      ['b','<i class="ic" data-lucide="briefcase"></i>','Активные проекты',PROJ.length,'<span class="st-s">в работе</span>'],

  /* ═══════ ENHANCEMENTS: badges · realtime · cmd-k · receipts · typing · export ═══════ */
  function _gt(ts){return new Date(ts||0).getTime()||0;}
  function grKey(gid){return 'ddc_gread_'+(CUR?CUR.login:'')+'_'+gid;}
  function grGet(gid){var v=0;try{v=+localStorage.getItem(grKey(gid))||0;}catch(e){}return v;}
  function grSet(gid){try{localStorage.setItem(grKey(gid),Date.now());}catch(e){}}
  function unreadDM(peer){return DB.dm.list().filter(function(m){return m.to===CUR.login&&m.from!==CUR.login&&!m.read&&(!peer||m.from===peer);}).length;}
  function unreadGroups(){var n=0;myGroups().forEach(function(g){var last=grGet(g.id);DB.gm.list().forEach(function(m){if(m.group===g.id&&m.from!==CUR.login&&_gt(m.ts)>last)n++;});});return n;}
  function totalUnread(){return unreadDM()+unreadGroups();}
  function updateChatBadge(){var b=document.getElementById('navChatBadge');if(!b)return;var n=totalUnread();if(n){b.textContent=n>99?'99+':n;b.hidden=false;}else b.hidden=true;}

  /* typing indicator (cross-tab via localStorage) */
  var _typingTs=0;
  function tKey(a,b){return 'ddc_typing_'+a+'_'+b;}
  function emitTyping(){if(chatPeer===null||(''+chatPeer).indexOf('g:')===0)return;var now=Date.now();if(now-_typingTs<1200)return;_typingTs=now;try{localStorage.setItem(tKey(CUR.login,chatPeer),String(now));}catch(e){}}
  function peerTyping(peer){if(!peer||(''+peer).indexOf('g:')===0)return false;var v=0;try{v=+localStorage.getItem(tKey(peer,CUR.login))||0;}catch(e){}return (Date.now()-v)<3500;}

  /* browser notifications */
  function askNotif(){try{if(window.Notification&&Notification.permission==='default')Notification.requestPermission();}catch(e){}}
  function notify(x){
    var P=(typeof PREFS==='object'&&PREFS)||{};
    if(P.toasts!==false)toast(x.t+(x.b?': '+(''+x.b).slice(0,60):''));
    try{if(P.browser!==false&&document.hidden&&window.Notification&&Notification.permission==='granted'){
      var n=new Notification(x.t,{body:x.b||'',icon:'img/favicon.png',tag:'ddc-'+(x.peer||x.v||'n')});
      n.onclick=function(){try{window.focus();}catch(e){}if(x.v){go(x.v);}else if(x.peer!==undefined){chatPeer=x.peer;go('chat');}n.close();};
    }}catch(e){}
  }

  /* realtime: poll every 3s + cross-tab storage events */
  var _lastRT=Date.now();
  function realtimeCheck(){
    if(!CUR)return;
    try{updateChatBadge();renderBell();}catch(e){}
    var since=_lastRT;_lastRT=Date.now();var neu=[];var P=(typeof PREFS==='object'&&PREFS)||{};
    if(P.msg!==false){
      DB.dm.list().forEach(function(m){if(m.to===CUR.login&&m.from!==CUR.login&&_gt(m.ts)>since)neu.push({t:'Сообщение от '+uName(m.from),b:m.text,peer:m.from});});
      myGroups().forEach(function(g){DB.gm.list().forEach(function(m){if(m.group===g.id&&m.from!==CUR.login&&_gt(m.ts)>since)neu.push({t:g.name,b:uName(m.from)+': '+m.text,peer:'g:'+g.id});});});
    }
    if(P.mentions!==false){
      DB.chat.list().forEach(function(m){if(m.from!==CUR.login&&_gt(m.ts)>since&&typeof mentionsMe==='function'&&mentionsMe(m.text))neu.push({t:'Упоминание в общем чате',b:uName(m.from)+': '+m.text,peer:null});});
    }
    if(P.incidents!==false&&typeof isSec==='function'&&isSec())DB.incidents.list().forEach(function(i){if(_gt(i.ts)>since)neu.push({t:'Инцидент ИБ',b:i.type,v:'security'});});
    neu.slice(-3).forEach(notify);
    if(view==='chat')try{renderChatLog();}catch(e){}
  }
  window.addEventListener('storage',function(e){
    if(!e.key)return;
    if(e.key.indexOf('ddc_db_dm')===0||e.key.indexOf('ddc_db_gm')===0||e.key.indexOf('ddc_db_chat')===0||e.key.indexOf('ddc_db_incidents')===0){realtimeCheck();if(view==='chat')try{renderChatLog();}catch(_){}}
    else if(e.key.indexOf('ddc_typing_')===0){if(view==='chat')try{renderChatLog();}catch(_){}}
  });
  setInterval(realtimeCheck,3000);

  /* CSV export */
  function toCSV(rows){return rows.map(function(r){return r.map(function(c){c=(c==null?'':String(c));return /[",\n;]/.test(c)?'"'+c.replace(/"/g,'""')+'"':c;}).join(';');}).join('\r\n');}
  function dlCSV(name,text){var blob=new Blob(['\ufeff'+text],{type:'text/csv;charset=utf-8'});var u=URL.createObjectURL(blob);var a=document.createElement('a');a.href=u;a.download=name;document.body.appendChild(a);a.click();setTimeout(function(){URL.revokeObjectURL(u);a.remove();},100);}
  function exportRequests(){var mgr=(typeof isMgr==='function'&&isMgr());var list=mgr?DB.reqs.list():myReqs();var rows=[['Дата','Сотрудник','Логин','Тип','Комментарий','Статус']];list.forEach(function(r){rows.push([(r.ts||'').slice(0,10),r.user||'',r.login||'',r.type||'',r.comment||'',r.status||'']);});dlCSV('zayavki_ddc.csv',toCSV(rows));toast('Экспортировано заявок: '+list.length);}
  function exportIncidents(){var list=(DB.incidents?DB.incidents.list():[]);var rows=[['Дата','Тип','Уровень','Статус','Описание']];list.forEach(function(i){rows.push([(i.ts||'').slice(0,10),i.type||'',i.sev||i.level||'',i.status||'new',i.desc||i.note||'']);});dlCSV('incidenty_ddc.csv',toCSV(rows));toast('Экспортировано инцидентов: '+list.length);}

  /* after every view render: badge + export buttons */
  function afterRender(){
    try{updateChatBadge();}catch(e){}
    var vw=$('view'),vt=vw&&vw.querySelector('.vtitle');
    if(vt&&(view==='requests'||view==='security')&&!vt.querySelector('.exp-btn')){
      var btn=document.createElement('button');btn.className='btn exp-btn';btn.type='button';
      btn.innerHTML=window.ico('download')+' CSV';
      btn.addEventListener('click',view==='requests'?exportRequests:exportIncidents);
      vt.appendChild(btn);
    }
  }

  /* command palette (Cmd/Ctrl-K) */
  (function(){
    var ov=document.createElement('div');ov.className='cmdk';ov.hidden=true;
    ov.innerHTML='<div class="cmdk-box"><input class="cmdk-in" placeholder="Поиск: разделы, люди, заявки, документы…"><div class="cmdk-list"></div><div class="cmdk-hint">↑↓ выбрать · Enter открыть · Esc закрыть</div></div>';
    document.body.appendChild(ov);
    var inp=ov.querySelector('.cmdk-in'),listEl=ov.querySelector('.cmdk-list'),items=[],sel=0;
    function build(q){q=(q||'').toLowerCase().trim();var out=[];
      NAV.forEach(function(n){if(n[0]==='analytics'&&!(typeof isMgr==='function'&&isMgr()))return;if(!q||n[1].toLowerCase().indexOf(q)>=0)out.push({t:n[1],s:'Раздел',act:function(){go(n[0]);}});});
      if(q){
        DB.users.list().filter(function(u){return u.login!==CUR.login;}).forEach(function(u){if((u.name||'').toLowerCase().indexOf(q)>=0||(u.dept||'').toLowerCase().indexOf(q)>=0)out.push({t:u.name||u.login,s:'Сотрудник',act:function(){chatPeer=u.login;go('chat');}});});
        myReqs().forEach(function(r){if((r.type||'').toLowerCase().indexOf(q)>=0)out.push({t:'Заявка: '+r.type,s:'Заявки',act:function(){go('requests');}});});
        DB.courses.list().forEach(function(c){if((c.title||'').toLowerCase().indexOf(q)>=0)out.push({t:c.title,s:'Обучение',act:function(){go('learning');}});});
        (DB.docs?DB.docs.list():[]).forEach(function(d){if((d.title||d.name||'').toLowerCase().indexOf(q)>=0)out.push({t:d.title||d.name,s:'Документы',act:function(){go('docs');}});});
        DB.ann.list().forEach(function(a){if((a.title||'').toLowerCase().indexOf(q)>=0)out.push({t:a.title,s:'Новость',act:function(){go('home');}});});
      }
      return out.slice(0,8);
    }
    function draw(){listEl.innerHTML=items.map(function(it,i){return '<button class="cmdk-it'+(i===sel?' on':'')+'" data-i="'+i+'"><span>'+esc(it.t)+'</span><em>'+esc(it.s)+'</em></button>';}).join('')||'<div class="cmdk-empty">Ничего не найдено</div>';[].forEach.call(listEl.querySelectorAll('[data-i]'),function(b){b.addEventListener('click',function(){run(+b.getAttribute('data-i'));});});}
    function refresh(){items=build(inp.value);sel=0;draw();}
    function run(i){var it=items[i];if(!it)return;closek();it.act();}
    function openk(){if(!CUR)return;ov.hidden=false;inp.value='';refresh();setTimeout(function(){inp.focus();},30);}
    function closek(){ov.hidden=true;}
    inp.addEventListener('input',refresh);
    inp.addEventListener('keydown',function(e){if(e.key==='ArrowDown'){e.preventDefault();sel=Math.min(sel+1,items.length-1);draw();}else if(e.key==='ArrowUp'){e.preventDefault();sel=Math.max(sel-1,0);draw();}else if(e.key==='Enter'){e.preventDefault();run(sel);}else if(e.key==='Escape'){closek();}});
    ov.addEventListener('click',function(e){if(e.target===ov)closek();});
    document.addEventListener('keydown',function(e){if((e.metaKey||e.ctrlKey)&&(e.key==='k'||e.key==='K')){e.preventDefault();if(ov.hidden)openk();else closek();}});
    var _cb=document.getElementById('cmdkBtn');if(_cb)_cb.addEventListener('click',openk);
    window.__openCmdk=openk;
  })();


  /* ═══════ ENHANCEMENTS 2: reactions · mentions · notif-prefs · shortcuts ═══════ */
  var PREFS={toasts:true,browser:true,msg:true,mentions:true,incidents:true};
  try{var _sp=JSON.parse(localStorage.getItem('ddc_notif_prefs')||'null');if(_sp)for(var _k in _sp)PREFS[_k]=_sp[_k];}catch(e){}
  function savePrefs(){try{localStorage.setItem('ddc_notif_prefs',JSON.stringify(PREFS));}catch(e){}}

  /* mentions + rich text */
  function _firstName(n){return (n||'').trim().split(/\s+/)[0]||'';}
  function mentionsMe(text){if(!text||!CUR)return false;var t=(''+text).toLowerCase();if(t.indexOf('@'+CUR.login.toLowerCase())>=0)return true;var fn=_firstName(CUR.name).toLowerCase();return !!fn&&t.indexOf('@'+fn)>=0;}
  function renderText(text){var out=esc(text||'');out=out.replace(/@([A-Za-zА-Яа-яЁё0-9_.\-]+)/g,'<span class="mention">@$1</span>');if(chatFilter){var q=(''+chatFilter).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');if(q)try{out=out.replace(new RegExp('('+q+')','ig'),'<mark>$1</mark>');}catch(e){}}return out;}

  /* reactions */
  function rxCollByKind(kind){return kind==='team'?DB.chat:(kind==='g'?DB.gm:DB.dm);}
  function toggleRx(mid,key,kind){var coll=rxCollByKind(kind);var m=coll.list().filter(function(x){return x.id===mid;})[0];if(!m)return;var rx=m.rx||{};var arr=(rx[key]||[]).slice();var i=arr.indexOf(CUR.login);if(i>=0)arr.splice(i,1);else arr.push(CUR.login);rx[key]=arr;coll.update(mid,{rx:rx});try{renderChatLog();}catch(e){}}
  function rxBar(m){var rx=m.rx||{};var defs=[['like','thumbs-up'],['heart','heart'],['check','check']];var html=defs.map(function(d){var arr=rx[d[0]]||[];var on=arr.indexOf(CUR.login)>=0;return '<button class="rx'+(on?' on':'')+'" data-rx="'+d[0]+'" data-mid="'+esc(String(m.id))+'" title="'+arr.length+'">'+window.ico(d[1])+(arr.length?'<span>'+arr.length+'</span>':'')+'</button>';}).join('');return '<div class="cmsg-rx">'+html+'</div>';}

  /* generic modal */
  function modal(html){var ov=document.createElement('div');ov.className='kmodal';ov.innerHTML='<div class="kmodal-box">'+html+'</div>';document.body.appendChild(ov);function close(){ov.remove();}ov.addEventListener('click',function(e){if(e.target===ov)close();});ov.querySelectorAll('[data-close]').forEach(function(b){b.addEventListener('click',close);});if(window.lucide)window.lucide.createIcons(ov);return {el:ov,close:close};}

  /* notification preferences */
  function openPrefs(){
    var rows=[['toasts','Всплывающие уведомления (тосты)'],['browser','Уведомления браузера'],['msg','Новые сообщения'],['mentions','Упоминания @'],['incidents','Инциденты ИБ']];
    var m=modal('<h3>'+window.ico('settings')+' Уведомления</h3>'+rows.map(function(r){return '<div class="krow"><span>'+r[1]+'</span><button class="sw'+(PREFS[r[0]]!==false?' on':'')+'" data-pref="'+r[0]+'" type="button" role="switch"></button></div>';}).join('')+'<button class="kmodal-close" data-close type="button">Готово</button>');
    m.el.querySelectorAll('[data-pref]').forEach(function(b){b.addEventListener('click',function(){var k=b.getAttribute('data-pref');PREFS[k]=(PREFS[k]===false);b.classList.toggle('on',PREFS[k]!==false);savePrefs();if(k==='browser'&&PREFS.browser!==false&&typeof askNotif==='function')askNotif();});});
  }

  /* keyboard shortcuts help */
  function openShortcuts(){
    modal('<h3>'+window.ico('keyboard')+' Горячие клавиши</h3>'+
      '<div class="krow"><span>Поиск по порталу</span><kbd>Ctrl / ⌘ + K</kbd></div>'+
      '<div class="krow"><span>Эта справка</span><kbd>?</kbd></div>'+
      '<div class="krow"><span>Закрыть окно</span><kbd>Esc</kbd></div>'+
      '<div class="krow"><span>Уведомления</span><kbd>клик по колокольчику</kbd></div>'+
      '<div class="krow"><span>Реакция на сообщение</span><kbd>клик под сообщением</kbd></div>'+
      '<button class="kmodal-close" data-close type="button">Закрыть</button>');
  }
  document.addEventListener('keydown',function(e){
    var tag=(e.target&&e.target.tagName||'').toLowerCase();var typing=(tag==='input'||tag==='textarea'||e.target&&e.target.isContentEditable);
    if(!typing&&(e.key==='?'||(e.shiftKey&&e.key==='/'))&&CUR){e.preventDefault();openShortcuts();}
  });

  /* header buttons: settings gear */
  (function(){var g=document.getElementById('prefsBtn');if(g)g.addEventListener('click',openPrefs);})();


  var sess=DB?DB.session.get():null;
  if(!DB){try{$('lErr').textContent='Не загрузились данные портала. Обновите страницу (Ctrl+Shift+R).';}catch(e){}}
  if(sess)showApp(sess); else {$('login').hidden=false;$('app').hidden=true;}
})();
</script>
<script src="portal-sync.js"></script>
<script>
if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}
(function(){var dp=null,btn=document.getElementById('installBtn');
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();dp=e;if(btn)btn.hidden=false;});
if(btn)btn.addEventListener('click',function(){if(!dp)return;dp.prompt();dp.userChoice.then(function(){dp=null;btn.hidden=true;});});
window.addEventListener('appinstalled',function(){if(btn)btn.hidden=true;});})();
</script>
<script>(function(){function run(){if(window.lucide)window.lucide.createIcons();}window.addEventListener("load",function(){run();var q=false;var mo=new MutationObserver(function(){if(q)return;q=true;requestAnimationFrame(function(){q=false;run();});});mo.observe(document.body,{childList:true,subtree:true});});})();</script>
</body>
