<body class="portal-body">
<div class="plogin" id="aLogin">
  <a class="plogin-back" href="index.html">← На сайт</a>
  <div class="plogin-card">
    <span class="brand-badge big"><img class="brand-emblem" src="img/ddc_mark_white.png" alt="DDC"></span>
    <h1>Админ-панель</h1>
    <p>Управление порталом сотрудников</p>
    <form id="aLoginForm">
      <input id="aUser" placeholder="Логин администратора" autocomplete="username">
      <input id="aPass" type="password" placeholder="Пароль" autocomplete="current-password">
      <button class="btn btn-primary" type="submit">Войти →</button>
      <div class="plogin-err" id="aErr"></div>
      <div class="plogin-hint">Демо-доступ администратора: admin / admin</div>
    </form>
  </div>
</div>

<div class="pdash" id="aDash" hidden>
  <header class="pbar">
    <a class="brand" href="index.html"><span class="brand-badge"><img class="brand-emblem" src="img/ddc_mark_white.png" alt="DDC" width="22" height="22"></span><span>DDC<small>Админ-панель</small></span></a>
    <div class="pbar-right"><span id="aWho"></span><a class="pbtn" href="portal.html">Портал</a><button class="pbtn" id="aReset">Сбросить демо</button><button class="pbtn" id="aLogout">Выйти</button></div>
  </header>
  <main class="pmain">
    <div class="atabs">
      <button class="atab active" data-tab="users">Сотрудники и роли</button>
      <button class="atab" data-tab="apps">Отклики <span class="abadge" id="aAppsN"></span></button>
      <button class="atab" data-tab="reqs">Заявки сотрудников <span class="abadge" id="aReqsN"></span></button>
      <button class="atab" data-tab="courses">Обучение</button>
      <button class="atab" data-tab="ann">Объявления</button>
      <button class="atab" data-tab="audit">Мониторинг</button>
      <button class="atab" data-tab="stats">Дашборд</button>
    </div>
    <div class="apane" id="pane-users"></div>
    <div class="apane" id="pane-apps" hidden></div>
    <div class="apane" id="pane-reqs" hidden></div>
    <div class="apane" id="pane-courses" hidden></div>
    <div class="apane" id="pane-ann" hidden></div>
    <div class="apane" id="pane-audit" hidden></div>
    <div class="apane" id="pane-stats" hidden></div>
  </main>
</div>
<div class="ptoast" id="aToast"></div>
<script src="config.js"></script>
<script src="portal-db.js"></script>
<script>
(function(){
  if(!window.DDCDB){return;}
  var login=document.getElementById('aLogin'),dash=document.getElementById('aDash');
  var ROLES={employee:'Сотрудник',manager:'Руководитель',security:'Кибербезопасность',admin:'Администратор'};
  var STATUS={new:'Новая',progress:'В работе',closed:'Закрыта'};
  function statusSel(tbl,id,val){val=val||'new';return '<select class="astatus st-'+val+'" data-st="'+tbl+'|'+id+'">'+Object.keys(STATUS).map(function(k){return '<option value="'+k+'"'+(val===k?' selected':'')+'>'+STATUS[k]+'</option>';}).join('')+'</select>';}
  function wireStatus(reRender){
    document.querySelectorAll('[data-st]').forEach(function(sel){sel.addEventListener('change',function(){
      var pr=sel.dataset.st.split('|');DDCDB[pr[0]].update(pr[1],{status:sel.value});toast('Статус обновлён');reRender();
    });});
  }
  function csv(rows,cols){
    var head=cols.map(function(c){return '"'+c.label+'"';}).join(',');
    var body=rows.map(function(r){return cols.map(function(c){var v=(r[c.key]==null?'':String(r[c.key])).replace(/"/g,'""');return '"'+v+'"';}).join(',');}).join('\n');
    return head+'\n'+body;
  }
  function download(name,text){var blob=new Blob(['\ufeff'+text],{type:'text/csv;charset=utf-8;'});var u=URL.createObjectURL(blob);var a=document.createElement('a');a.href=u;a.download=name;a.click();setTimeout(function(){URL.revokeObjectURL(u);},800);}
  function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function toast(m){var t=document.getElementById('aToast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2200);}
  function attachFilter(inpId,getRows){var inp=document.getElementById(inpId);if(!inp)return;inp.addEventListener('input',function(){var q=inp.value.trim().toLowerCase();getRows().forEach(function(el){el.style.display=(!q||(el.textContent||'').toLowerCase().indexOf(q)>=0)?'':'none';});});}

  var sess=DDCDB.session.get();
  if(sess&&sess.role==='admin')showDash(sess);
  document.getElementById('aLoginForm').addEventListener('submit',function(e){
    e.preventDefault();
    var ulogin=document.getElementById('aUser').value.trim();
    var lk=DDCDB.lockout.check(ulogin);
    if(lk.locked){document.getElementById('aErr').textContent='Слишком много попыток. Попробуйте через '+Math.ceil(lk.leftMs/60000)+' мин.';DDCDB.logEvent({action:'login_locked',source:'admin',login:ulogin});return;}
    var u=DDCDB.auth(ulogin,document.getElementById('aPass').value.trim());
    if(!u){var st=DDCDB.lockout.fail(ulogin);document.getElementById('aErr').textContent=st.locked?'Аккаунт временно заблокирован на 5 минут.':('Неверный логин или пароль. Осталось попыток: '+Math.max(0,5-(st.fails||0)));DDCDB.logEvent({action:'login_failed',source:'admin',login:ulogin});return;}
    if(u.role!=='admin'){document.getElementById('aErr').textContent='Доступ только для администратора';DDCDB.logEvent({action:'login_denied',source:'admin',login:u.login,name:u.name,role:u.role});return;}
    if(u.twofa){var code=prompt('Введите 6-значный код двухфакторной аутентификации:');if(code===null)return;if(!DDCDB.verifyPass((code||'').trim(),u.twofa)){DDCDB.lockout.fail(ulogin);DDCDB.logEvent({action:'twofa_failed',source:'admin',login:u.login,name:u.name});document.getElementById('aErr').textContent='Неверный код 2FA';return;}}
    DDCDB.lockout.ok(ulogin);DDCDB.session.set({login:u.login,name:u.name,role:u.role});DDCDB.logEvent({action:'login',source:'admin',login:u.login,name:u.name,role:u.role,known:true,twofa:!!u.twofa});showDash({login:u.login,name:u.name,role:u.role});
  });
  document.getElementById('aLogout').addEventListener('click',function(){var s=DDCDB.session.get();if(s)DDCDB.logEvent({action:'logout',source:'admin',login:s.login,name:s.name,role:s.role});DDCDB.session.clear();dash.hidden=true;login.hidden=false;});
  document.getElementById('aReset').addEventListener('click',function(){if(confirm('Сбросить все демо-данные портала?')){DDCDB.reset();location.reload();}});
  function showDash(u){login.hidden=true;dash.hidden=false;document.getElementById('aWho').textContent=u.name+' · '+ROLES[u.role];renderAll();checkNewApps();}
  function appsSeenTs(){try{return localStorage.getItem('ddc_apps_seen')||'';}catch(e){return '';}}
  function markAppsSeen(){try{var a=DDCDB.apps.list();localStorage.setItem('ddc_apps_seen',a.length?(a[0].ts||''):'');}catch(e){}var b=document.getElementById('aAppsN');if(b)b.classList.remove('attn');}
  function checkNewApps(){var a=DDCDB.apps.list();var seen=appsSeenTs();var n=a.filter(function(x){return (x.ts||'')>seen;}).length;var b=document.getElementById('aAppsN');if(n>0){if(b)b.classList.add('attn');toast('<i class="ic" data-lucide="bell"></i> Новых откликов: '+n);}else if(b){b.classList.remove('attn');}}

  document.querySelectorAll('.atab').forEach(function(t){t.addEventListener('click',function(){
    document.querySelectorAll('.atab').forEach(function(x){x.classList.remove('active');});t.classList.add('active');
    if(t.dataset.tab==='apps')markAppsSeen();
    ['users','apps','reqs','courses','ann','audit','stats'].forEach(function(k){document.getElementById('pane-'+k).hidden=(k!==t.dataset.tab);});
  });});

  function renderAll(){renderUsers();renderApps();renderReqs();renderCoursesA();renderAnn();renderAudit();renderStats();}
  window.addEventListener('ddcdb-sync',function(){if(!dash.hidden)renderAll();});

  function renderUsers(){
    var users=DDCDB.users.list();
    var rows=users.map(function(u){
      return '<tr><td><b>'+esc(u.name)+'</b><br><span class="amut">'+esc(u.login)+'</span></td><td>'+esc(u.dept||'—')+'</td>'+
        '<td><select data-role="'+u.id+'">'+Object.keys(ROLES).map(function(r){return '<option value="'+r+'"'+(u.role===r?' selected':'')+'>'+ROLES[r]+'</option>';}).join('')+'</select></td>'+
        '<td><button class="alink" data-pwuser="'+u.id+'">Пароль</button> <button class="alink" data-2fa="'+u.id+'">2FA'+(u.twofa?' ✓':'')+'</button> <button class="alink del" data-deluser="'+u.id+'">Удалить</button></td></tr>';
    }).join('');
    document.getElementById('pane-users').innerHTML=
      '<div class="acard"><h3>Сотрудники ('+users.length+')</h3><table class="atable"><thead><tr><th>Сотрудник</th><th>Отдел</th><th>Роль</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>'+
      '<div class="acard"><h3>Добавить сотрудника</h3><form id="addUser" class="aform"><input name="login" placeholder="Логин" required><input name="name" placeholder="Имя и фамилия" required><input name="dept" placeholder="Отдел"><select name="role">'+Object.keys(ROLES).map(function(r){return '<option value="'+r+'">'+ROLES[r]+'</option>';}).join('')+'</select><div class="apass"><input name="pass" id="auPass" type="password" placeholder="Пароль *" required autocomplete="new-password"><button type="button" class="apass-btn" id="auGen" title="Сгенерировать"><i class="ic" data-lucide="dices"></i></button><button type="button" class="apass-btn" id="auShow" title="Показать/скрыть"><i class="ic" data-lucide="eye"></i></button></div><button class="btn btn-primary" type="submit">Добавить</button></form></div>';
    document.querySelectorAll('[data-role]').forEach(function(sel){sel.addEventListener('change',function(){DDCDB.users.update(sel.dataset.role,{role:sel.value});toast('Роль обновлена');});});
    document.querySelectorAll('[data-deluser]').forEach(function(b){b.addEventListener('click',function(){DDCDB.users.remove(b.dataset.deluser);toast('Сотрудник удалён');renderUsers();});});
    document.querySelectorAll('[data-pwuser]').forEach(function(b){b.addEventListener('click',function(){
      var u=DDCDB.users.list().filter(function(x){return x.id===b.dataset.pwuser;})[0]; if(!u)return;
      var np=prompt('Новый пароль для «'+u.name+'»:');
      if(np===null)return; np=np.trim(); if(!np){toast('Пароль не может быть пустым');return;}
      DDCDB.users.update(u.id,{passh:DDCDB.hashPass(np),pass:undefined}); toast('Пароль обновлён');
    });});
    document.querySelectorAll('[data-2fa]').forEach(function(b){b.addEventListener('click',function(){
      var u=DDCDB.users.list().filter(function(x){return x.id===b.dataset['2fa'];})[0]; if(!u)return;
      if(u.twofa){ if(confirm('Отключить 2FA для «'+u.name+'»?')){DDCDB.users.update(u.id,{twofa:undefined});toast('2FA отключена');renderUsers();} return; }
      var code=prompt('Включить 2FA для «'+u.name+'». Задайте 6-значный код (его сотрудник вводит при входе):');
      if(code===null)return; code=(code||'').trim();
      if(!/^[0-9]{4,8}$/.test(code)){toast('Код должен быть из 4–8 цифр');return;}
      DDCDB.users.update(u.id,{twofa:DDCDB.hashPass(code)}); toast('2FA включена'); renderUsers();
    });});
    var pwField=document.getElementById('auPass');
    var gen=document.getElementById('auGen'); if(gen)gen.addEventListener('click',function(){
      var ch='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789!@#$%';var p='';for(var i=0;i<12;i++)p+=ch.charAt(Math.floor(Math.random()*ch.length));
      pwField.value=p; pwField.type='text'; pwField.focus();});
    var shw=document.getElementById('auShow'); if(shw)shw.addEventListener('click',function(){pwField.type=pwField.type==='password'?'text':'password';});
    var f=document.getElementById('addUser');f.addEventListener('submit',function(e){e.preventDefault();var d=new FormData(f);
      var pass=(d.get('pass')||'').trim(); if(!pass){toast('Укажите пароль');pwField.focus();return;}
      var login=(d.get('login')||'').trim();
      if(DDCDB.users.list().some(function(x){return x.login===login;})){toast('Логин уже занят');return;}
      DDCDB.users.add({login:login,name:(d.get('name')||'').trim(),dept:(d.get('dept')||'').trim(),role:d.get('role'),passh:DDCDB.hashPass(pass)});toast('Сотрудник добавлен · вход: '+login);renderUsers();});
  }

  function renderApps(){
    var apps=DDCDB.apps.list();
    document.getElementById('aAppsN').textContent=apps.length||'';
    var rows=apps.length?apps.map(function(a){
      var ds=a.ts?new Date(a.ts).toLocaleDateString('ru-RU'):'';
      var resume='';
      if(a.resumeData){ resume='<div style="margin-top:6px;display:flex;gap:14px;flex-wrap:wrap">'+
        '<a class="alink" style="color:#0071e3" href="'+a.resumeData+'" target="_blank" rel="noopener"><i class="ic" data-lucide="eye"></i> Просмотр резюме</a>'+
        '<a class="alink" style="color:#0a9d57" href="'+a.resumeData+'" download="'+esc(a.resumeName||'resume')+'"><i class="ic" data-lucide="paperclip"></i> Скачать'+(a.resumeName?(' · '+esc(a.resumeName)):'')+'</a></div>'; }
      else if(a.resumeName){ resume='<p class="amut" style="margin-top:6px"><i class="ic" data-lucide="paperclip"></i> '+esc(a.resumeName)+' (файл не сохранён локально)</p>'; }
      return '<div class="acard arow"><div><b>'+esc(a.name)+'</b> · <span class="amut">'+esc(a.email)+'</span>'+(a.phone?' · '+esc(a.phone):'')+'<br><span class="atag">'+esc(a.vacancy||'')+'</span> <span class="amut">'+ds+'</span>'+(a.cover?'<p class="acov">'+esc(a.cover)+'</p>':'')+resume+'</div><div class="aright">'+statusSel('apps',a.id,a.status)+'<button class="alink del" data-delapp="'+a.id+'">Удалить</button></div></div>';
    }).join(''):'';
    document.getElementById('pane-apps').innerHTML='<div class="apane-bar"><h3 class="apane-h">Отклики на вакансии ('+apps.length+')</h3>'+(apps.length?'<button class="pbtn" id="expApps">Экспорт CSV</button>':'')+'</div>'+
      (apps.length?'<input class="asearch" id="appsSearch" placeholder="Поиск: имя, email, вакансия…">':'')+
      '<div id="appsRows">'+(rows||'<div class="acard amut">Заявок пока нет. Отклики с вакансий («Карьера») будут появляться здесь.</div>')+'</div>';
    document.querySelectorAll('[data-delapp]').forEach(function(b){b.addEventListener('click',function(){DDCDB.apps.remove(b.dataset.delapp);toast('Заявка удалена');renderApps();});});
    var ex=document.getElementById('expApps');if(ex)ex.addEventListener('click',function(){download('ddc_otkliki.csv',csv(DDCDB.apps.list(),[{key:'vacancy',label:'Вакансия'},{key:'name',label:'ФИО'},{key:'email',label:'Email'},{key:'phone',label:'Телефон'},{key:'status',label:'Статус'},{key:'ts',label:'Дата'},{key:'cover',label:'Письмо'}]));});
    attachFilter('appsSearch',function(){return Array.prototype.slice.call(document.querySelectorAll('#appsRows > .arow'));});
    wireStatus(renderApps);
  }

  function renderReqs(){
    var reqs=DDCDB.reqs.list();
    document.getElementById('aReqsN').textContent=reqs.length||'';
    var rows=reqs.length?reqs.map(function(a){
      var ds=a.ts?new Date(a.ts).toLocaleDateString('ru-RU'):'';
      return '<div class="acard arow"><div><b>'+esc(a.type)+'</b><br><span class="amut">'+esc(a.user||'—')+(a.login?' ('+esc(a.login)+')':'')+' · '+ds+'</span>'+(a.comment?'<p class="acov">'+esc(a.comment)+'</p>':'')+'</div><div class="aright">'+statusSel('reqs',a.id,a.status)+'<button class="alink del" data-delreq="'+a.id+'">Удалить</button></div></div>';
    }).join(''):'<div class="acard amut">Заявок сотрудников пока нет. Запросы из портала (справки, отпуск и т.д.) появятся здесь.</div>';
    document.getElementById('pane-reqs').innerHTML='<div class="apane-bar"><h3 class="apane-h">Заявки сотрудников</h3>'+(reqs.length?'<button class="pbtn" id="expReqs">Экспорт CSV</button>':'')+'</div>'+rows;
    document.querySelectorAll('[data-delreq]').forEach(function(b){b.addEventListener('click',function(){DDCDB.reqs.remove(b.dataset.delreq);toast('Заявка удалена');renderReqs();});});
    var ex=document.getElementById('expReqs');if(ex)ex.addEventListener('click',function(){download('ddc_zayavki.csv',csv(DDCDB.reqs.list(),[{key:'type',label:'Тип'},{key:'user',label:'Сотрудник'},{key:'login',label:'Логин'},{key:'comment',label:'Комментарий'},{key:'status',label:'Статус'},{key:'ts',label:'Дата'}]));});
    wireStatus(renderReqs);
  }

  function renderCoursesA(){
    var courses=DDCDB.courses.list();
    var rows=courses.map(function(c){
      return '<div class="acard arow"><div><b>'+esc(c.title)+'</b> <span class="atag">'+esc(c.level||'Курс')+'</span> <span class="amut">'+esc(c.duration||'')+'</span><p class="acov">'+esc(c.desc)+'</p></div><button class="alink del" data-delcourse="'+c.id+'">Удалить</button></div>';
    }).join('');
    document.getElementById('pane-courses').innerHTML='<h3 class="apane-h">Курсы обучения ('+courses.length+')</h3>'+rows+
      '<div class="acard"><h3>Добавить курс</h3><form id="addCourse" class="aform col"><input name="title" placeholder="Название курса" required><textarea name="desc" placeholder="Описание" rows="2"></textarea><div class="aform"><input name="level" placeholder="Уровень (Базовый/Средний…)"><input name="duration" placeholder="Длительность (напр. 2 часа)"><button class="btn btn-primary" type="submit">Добавить курс</button></div></form></div>';
    document.querySelectorAll('[data-delcourse]').forEach(function(b){b.addEventListener('click',function(){DDCDB.courses.remove(b.dataset.delcourse);toast('Курс удалён');renderCoursesA();});});
    var f=document.getElementById('addCourse');f.addEventListener('submit',function(e){e.preventDefault();var d=new FormData(f);DDCDB.courses.add({title:(d.get('title')||'').trim(),desc:(d.get('desc')||'').trim(),level:(d.get('level')||'Курс').trim(),duration:(d.get('duration')||'').trim()});toast('Курс добавлен');renderCoursesA();});
  }

  function renderAnn(){
    var ann=DDCDB.ann.list();
    var rows=ann.map(function(a){
      return '<div class="acard arow"><div><span class="atag">'+esc(a.tag)+'</span><br><b>'+esc(a.title)+'</b><p class="acov">'+esc(a.text)+'</p></div><button class="alink del" data-delann="'+a.id+'">Удалить</button></div>';
    }).join('');
    document.getElementById('pane-ann').innerHTML='<h3 class="apane-h">Объявления портала</h3>'+rows+
      '<div class="acard"><h3>Новое объявление</h3><form id="addAnn" class="aform col"><input name="tag" placeholder="Метка (ИТ, HR, Безопасность…)" required><input name="title" placeholder="Заголовок" required><textarea name="text" placeholder="Текст объявления" rows="3" required></textarea><button class="btn btn-primary" type="submit">Опубликовать</button></form></div>';
    document.querySelectorAll('[data-delann]').forEach(function(b){b.addEventListener('click',function(){DDCDB.ann.remove(b.dataset.delann);toast('Объявление удалено');renderAnn();});});
    var f=document.getElementById('addAnn');f.addEventListener('submit',function(e){e.preventDefault();var d=new FormData(f);DDCDB.ann.add({tag:(d.get('tag')||'').trim(),title:(d.get('title')||'').trim(),text:(d.get('text')||'').trim()});toast('Объявление опубликовано');renderAnn();});
  }

  // ── monitoring: who logged in and when ──
  function deviceLabel(ua){ ua=ua||'';
    var os='ПК'; if(/Android/i.test(ua))os='Android'; else if(/iPhone|iPad|iPod/i.test(ua))os='iOS'; else if(/Windows/i.test(ua))os='Windows'; else if(/Mac OS X|Macintosh/i.test(ua))os='macOS'; else if(/Linux/i.test(ua))os='Linux';
    var br='браузер'; if(/Edg\//i.test(ua))br='Edge'; else if(/OPR\/|Opera/i.test(ua))br='Opera'; else if(/Chrome\//i.test(ua))br='Chrome'; else if(/Firefox\//i.test(ua))br='Firefox'; else if(/Safari\//i.test(ua))br='Safari';
    return os+' · '+br;
  }
  function auditLabel(a){
    return a==='login'?'<span class="apill ok">Вход</span>':a==='logout'?'<span class="apill mut">Выход</span>':
      a==='login_failed'?'<span class="apill bad">Неуд. вход</span>':a==='login_denied'?'<span class="apill bad">Отказ доступа</span>':
      '<span class="apill mut">'+esc(a)+'</span>';
  }
  function renderAudit(){
    var log=DDCDB.audit.list();
    var pane=document.getElementById('pane-audit'); if(!pane)return;
    // last activity per known user
    var seen={}, summary=[];
    log.forEach(function(e){ if((e.action==='login')&&e.login&&!seen[e.login]){seen[e.login]=e; summary.push(e);} });
    var sumHtml=summary.slice(0,8).map(function(e){
      var dt=new Date(e.ts); var ds=dt.toLocaleDateString('ru-RU')+' '+('0'+dt.getHours()).slice(-2)+':'+('0'+dt.getMinutes()).slice(-2);
      return '<div class="acard arow"><div><b>'+esc(e.name||e.login)+'</b> <span class="amut">'+esc(e.login)+'</span><br><span class="amut">последний вход: '+ds+' · '+esc(deviceLabel(e.ua))+'</span></div></div>';
    }).join('');
    var rows=log.slice(0,200).map(function(e){
      var dt=e.ts?new Date(e.ts):null;
      var ds=dt?(dt.toLocaleDateString('ru-RU')+' '+('0'+dt.getHours()).slice(-2)+':'+('0'+dt.getMinutes()).slice(-2)+':'+('0'+dt.getSeconds()).slice(-2)):'';
      return '<tr><td class="amono">'+ds+'</td><td><b>'+esc(e.name||'—')+'</b><br><span class="amut">'+esc(e.login||'')+'</span></td><td>'+auditLabel(e.action)+'</td><td class="amut">'+esc(e.source||'')+'</td><td class="amut">'+esc(deviceLabel(e.ua))+'</td></tr>';
    }).join('');
    pane.innerHTML=
      '<div class="apane-bar"><h3 class="apane-h">Мониторинг входов ('+log.length+')</h3><div style="display:flex;gap:8px">'+
        (log.length?'<button class="pbtn" id="expAudit">Экспорт CSV</button><button class="pbtn" id="clrAudit">Очистить журнал</button>':'')+'</div></div>'+
      (summary.length?'<h4 class="apane-sub">Последняя активность сотрудников</h4>'+sumHtml:'')+
      '<h4 class="apane-sub">Журнал событий</h4>'+
      (log.length?'<input class="asearch" id="auditSearch" placeholder="Поиск: сотрудник, логин, событие…">':'')+
      (log.length?('<div class="acard" style="padding:0;overflow-x:auto"><table class="atable"><thead><tr><th>Время</th><th>Сотрудник</th><th>Событие</th><th>Раздел</th><th>Устройство</th></tr></thead><tbody id="auditRows">'+rows+'</tbody></table></div>'):'<div class="acard amut">Событий пока нет. Здесь будет видно, кто и когда заходил в портал и админ-панель.</div>');
    var ex=document.getElementById('expAudit'); if(ex)ex.addEventListener('click',function(){download('ddc_monitoring.csv',csv(DDCDB.audit.list().map(function(e){return {ts:e.ts,name:e.name,login:e.login,action:e.action,source:e.source,device:deviceLabel(e.ua)};}),[{key:'ts',label:'Время'},{key:'name',label:'Сотрудник'},{key:'login',label:'Логин'},{key:'action',label:'Событие'},{key:'source',label:'Раздел'},{key:'device',label:'Устройство'}]));});
    attachFilter('auditSearch',function(){return Array.prototype.slice.call(document.querySelectorAll('#auditRows > tr'));});
    var cl=document.getElementById('clrAudit'); if(cl)cl.addEventListener('click',function(){if(confirm('Очистить весь журнал мониторинга?')){DDCDB.audit.save([]);toast('Журнал очищен');renderAudit();}});
  }

  // ── statistics dashboard ──
  function pctBar(label,val,max){var w=max>0?Math.round(val/max*100):0;return '<div class="bar-row"><span class="bl">'+esc(label)+'</span><div class="bar-track"><div class="bar-fill" style="width:'+w+'%"></div></div><span class="bar-val">'+val+'</span></div>';}
  function renderStats(){
    var pane=document.getElementById('pane-stats'); if(!pane)return;
    var users=DDCDB.users.list(),apps=DDCDB.apps.list(),reqs=DDCDB.reqs.list(),audit=DDCDB.audit.list(),courses=DDCDB.courses.list();
    var progress={}; try{progress=JSON.parse(localStorage.getItem('ddc_db_progress')||'{}');}catch(e){}
    var newApps=apps.filter(function(a){return (a.status||'new')==='new';}).length;
    var openReqs=reqs.filter(function(r){return (r.status||'new')!=='closed';}).length;
    var days=[],counts=[],now=new Date();
    for(var i=6;i>=0;i--){var d=new Date(now);d.setDate(now.getDate()-i);d.setHours(0,0,0,0);days.push(d);counts.push(0);}
    audit.forEach(function(e){ if(e.action!=='login'||!e.ts)return; var t=new Date(e.ts);
      for(var j=0;j<7;j++){var d0=days[j],d1=new Date(days[j]);d1.setDate(d0.getDate()+1); if(t>=d0&&t<d1){counts[j]++;break;}} });
    var maxC=Math.max(1,Math.max.apply(null,counts));
    var spark='<div class="spark">'+counts.map(function(c){return '<div class="sb" style="height:'+Math.round(c/maxC*100)+'%"><span>'+(c||'')+'</span></div>';}).join('')+'</div><div class="spark-x">'+days.map(function(d){return '<div>'+d.getDate()+'.'+(d.getMonth()+1)+'</div>';}).join('')+'</div>';
    var byVac={}; apps.forEach(function(a){var k=a.vacancy||'—';byVac[k]=(byVac[k]||0)+1;});
    var vacE=Object.keys(byVac).map(function(k){return [k,byVac[k]];}).sort(function(a,b){return b[1]-a[1];});
    var vacMax=vacE.reduce(function(m,e){return Math.max(m,e[1]);},0);
    var done={}; courses.forEach(function(c){done[c.id]=0;});
    Object.keys(progress).forEach(function(login){(progress[login]||[]).forEach(function(cid){if(done[cid]!=null)done[cid]++;});});
    var trainMax=Math.max.apply(null,courses.map(function(c){return done[c.id]||0;}).concat([1]));
    var roleCount={}; users.forEach(function(u){roleCount[u.role]=(roleCount[u.role]||0)+1;});
    pane.innerHTML=
      '<h3 class="apane-h">Дашборд</h3>'+
      '<div class="stat-grid">'+
        '<div class="stat-card accent"><div class="stat-num">'+users.length+'</div><div class="stat-lbl">Сотрудников</div></div>'+
        '<div class="stat-card"><div class="stat-num">'+apps.length+'</div><div class="stat-lbl">Откликов всего</div></div>'+
        '<div class="stat-card accent"><div class="stat-num">'+newApps+'</div><div class="stat-lbl">Новых откликов</div></div>'+
        '<div class="stat-card"><div class="stat-num">'+openReqs+'</div><div class="stat-lbl">Открытых заявок</div></div>'+
        '<div class="stat-card"><div class="stat-num">'+audit.length+'</div><div class="stat-lbl">Событий входа</div></div>'+
      '</div>'+
      '<h4 class="apane-sub">Входы за последние 7 дней</h4><div class="acard">'+spark+'</div>'+
      '<h4 class="apane-sub">Отклики по вакансиям</h4><div class="acard">'+(vacE.length?vacE.map(function(e){return pctBar(e[0],e[1],vacMax);}).join(''):'<span class="amut">Откликов пока нет.</span>')+'</div>'+
      '<h4 class="apane-sub">Прохождение курсов (сотрудников завершило)</h4><div class="acard">'+(courses.length?courses.map(function(c){return pctBar(c.title,done[c.id]||0,trainMax);}).join(''):'<span class="amut">Курсов нет.</span>')+'</div>'+
      '<h4 class="apane-sub">Сотрудники по ролям</h4><div class="acard">'+Object.keys(roleCount).map(function(r){return pctBar(ROLES[r]||r,roleCount[r],users.length);}).join('')+'</div>';
  }
})();
</script>
