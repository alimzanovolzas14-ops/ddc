# Nginx для портала ЦЦР: HTTPS + проксирование на Node + поддержка WebSocket.
# Скопируйте в /etc/nginx/sites-available/ddc-portal и включите (см. DEPLOY.md, шаг 7).
# Замените portal.ddcnb.kz на ваш домен или адрес.

# нужно для проброса WebSocket (Upgrade). Блок map — в контексте http,
# файлы sites-available подключаются внутри http, поэтому он тут уместен.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name portal.ddcnb.kz;
    # весь трафик — на HTTPS
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name portal.ddcnb.kz;

    # Сертификаты. Для публичного домена их пропишет certbot автоматически.
    # Для внутреннего сервера укажите свой сертификат (см. DEPLOY.md, шаг 8Б).
    ssl_certificate     /etc/letsencrypt/live/portal.ddcnb.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.ddcnb.kz/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    client_max_body_size 5m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # проброс WebSocket (/ws) — без этого realtime не работает
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 3600s;   # держим долгие WebSocket-соединения
    }
}
